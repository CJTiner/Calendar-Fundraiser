<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-User Calendar Fundraiser</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #10b981;
            --accent-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Auth Screen Styles */
        .auth-container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
            margin-bottom: 2rem;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 3fr 1fr;
            }
        }

        /* Calendar Grid */
        .calendar-container {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 0.75rem;
        }

        .day-box {
            background: #334155;
            padding: 1rem 0.5rem;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
        }

        .day-number {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .day-amount {
            font-size: 0.9rem;
            color: #38bdf8;
            font-weight: 600;
        }

        .day-box:hover {
            transform: translateY(-4px);
            background-color: #475569;
        }

        .day-box.claimed {
            background-color: rgba(16, 185, 129, 0.15);
            border-color: var(--accent-color);
            cursor: not-allowed;
        }

        .day-box.claimed .day-amount {
            color: var(--accent-color);
        }

        .day-box.claimed .donor-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Sidebar Panel */
        .panel {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            height: fit-content;
        }

        h3 {
            margin-bottom: 1rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }

        .stats {
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
        }

        .stats span {
            color: var(--accent-color);
            font
